<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajat Agrawal</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            text-align:center;
            padding:60px;
            border-radius:20px;
            background:#1e293b;
            box-shadow:0 20px 50px rgba(0,0,0,.4);
        }

        h1{
            font-size:52px;
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            font-size:20px;
            margin-bottom:30px;
        }

        a{
            text-decoration:none;
            color:white;
            background:#2563eb;
            padding:15px 30px;
            border-radius:10px;
            display:inline-block;
            transition:.3s;
        }

        a:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🚀 It Works!</h1>

    <p>
        This website is being served from
        <strong>GitHub Pages</strong>.
    </p>

    <a href="https://github.com/Agrawal-Rajat">
        Visit My GitHub
    </a>
</div>

</body>
</html>
